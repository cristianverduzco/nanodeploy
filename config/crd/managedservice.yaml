apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: managedservices.nanodeploy.io
spec:
  group: nanodeploy.io
  names:
    kind: ManagedService
    listKind: ManagedServiceList
    plural: managedservices
    singular: managedservice
    shortNames:
      - ms
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Endpoint
          type: string
          jsonPath: .status.endpoint
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - type
                - version
              properties:
                type:
                  type: string
                  enum: [postgresql, redis, rabbitmq]
                version:
                  type: string
                replicas:
                  type: integer
                  default: 1
                  minimum: 1
                  maximum: 10
                storageGB:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 100
                databaseName:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                readyReplicas:
                  type: integer
                endpoint:
                  type: string
                lastUpdated:
                  type: string
                  format: date-time