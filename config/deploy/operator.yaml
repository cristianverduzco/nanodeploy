apiVersion: v1
kind: Namespace
metadata:
  name: nanodeploy-system

---
# ServiceAccount — the identity the operator runs as
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nanodeploy-operator
  namespace: nanodeploy-system

---
# ClusterRole — what the operator is allowed to do across the cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nanodeploy-operator
rules:
  # ManagedService CRD
  - apiGroups: ["nanodeploy.io"]
    resources: ["managedservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["nanodeploy.io"]
    resources: ["managedservices/status"]
    verbs: ["get", "update", "patch"]
  # Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services and PVCs
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events (for operator to emit events)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
# ClusterRoleBinding — bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nanodeploy-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nanodeploy-operator
subjects:
  - kind: ServiceAccount
    name: nanodeploy-operator
    namespace: nanodeploy-system

---
# Deployment — runs the operator itself
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanodeploy-operator
  namespace: nanodeploy-system
  labels:
    app: nanodeploy-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanodeploy-operator
  template:
    metadata:
      labels:
        app: nanodeploy-operator
    spec:
      serviceAccountName: nanodeploy-operator
      containers:
        - name: operator
          image: nanodeploy-operator:latest
          imagePullPolicy: Never
          args:
            - --leader-elect=false
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi